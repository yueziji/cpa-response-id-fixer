name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-amd64
            os: windows-latest
            goos: windows
            goarch: amd64
            cc: gcc
            ext: dll
            archive: cpa-response-id-fixer-windows-amd64.zip
          - name: linux-amd64
            os: ubuntu-latest
            goos: linux
            goarch: amd64
            cc: gcc
            ext: so
            archive: cpa-response-id-fixer-linux-amd64.zip
          - name: darwin-amd64
            os: macos-13
            goos: darwin
            goarch: amd64
            cc: clang
            ext: dylib
            archive: cpa-response-id-fixer-darwin-amd64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      - name: Set up MinGW
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: mingw-w64-ucrt-x86_64-gcc

      - name: Add MinGW to PATH
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          "C:\msys64\ucrt64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Download modules
        run: go mod download

      - name: Test
        run: go test ./...

      - name: Build native plugin
        shell: pwsh
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ matrix.cc }}
        run: |
          New-Item -ItemType Directory -Force -Path "dist"
          go build -buildmode=c-shared -trimpath -ldflags="-s -w" -o "dist/cpa-response-id-fixer.${{ matrix.ext }}" .
          Copy-Item -LiteralPath "README.md" -Destination "dist/README.md"

      - name: Package
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/cpa-response-id-fixer.${{ matrix.ext }}", "dist/README.md" -DestinationPath "dist/${{ matrix.archive }}" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Generate checksums
        shell: bash
        run: |
          find release-assets -type f -name '*.zip' -print0 | sort -z | xargs -0 sha256sum > release-assets/SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          target_commitish: ${{ github.sha }}
          files: |
            release-assets/**/*.zip
            release-assets/SHA256SUMS.txt
